<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>PhonePe Clone</title>
<link rel="stylesheet" href="style.css">
</head>

<body>

<header>
    <div class="logo">
        <h2>PhonePe</h2>
    </div>

    <div class="profile">
        <img src="https://cdn-icons-png.flaticon.com/512/149/149071.png">
    </div>
</header>


<section class="balance">
    <h3>Wallet Balance</h3>
    <h1>₹2,540</h1>
</section>


<section class="services">

<div class="service">
<img src="https://cdn-icons-png.flaticon.com/512/633/633611.png">
<p>To Mobile</p>
</div>

<div class="service">
<img src="https://cdn-icons-png.flaticon.com/512/3064/3064197.png">
<p>To Bank</p>
</div>

<div class="service">
<img src="https://cdn-icons-png.flaticon.com/512/1048/1048314.png">
<p>UPI</p>
</div>

<div class="service">
<img src="https://cdn-icons-png.flaticon.com/512/2554/2554961.png">
<p>Recharge</p>
</div>

</section>


<section class="transactions">

<h3>Recent Transactions</h3>

<div class="txn">
<p>Amazon Payment</p>
<span>- ₹450</span>
</div>

<div class="txn">
<p>Received from Rahul</p>
<span class="green">+ ₹900</span>
</div>

<div class="txn">
<p>Mobile Recharge</p>
<span>- ₹199</span>
</div>

</section>


<nav class="bottom-nav">

<div>Home</div>
<div>Stores</div>
<div>Insurance</div>
<div>History</div>

</nav>

<script src="script.js"></script>

</body>
</html>
